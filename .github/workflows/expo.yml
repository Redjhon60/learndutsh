# =============================================================================
# SnowB German AI — GitHub Actions CI/CD Workflow
# =============================================================================
#
# TRIGGERS:
#   • Push to main       → Full CI + EAS Preview APK build
#   • Push to develop    → Full CI only (no build)
#   • Pull Request       → Full CI only (no build)
#   • Manual dispatch    → Choose any build profile
#
# REQUIRED GITHUB SECRETS (repo Settings → Secrets → Actions):
#   EXPO_TOKEN                    Expo access token (expo.dev → Access Tokens)
#   ANTHROPIC_API_KEY             Claude AI key
#   FIREBASE_API_KEY              Firebase web config
#   FIREBASE_AUTH_DOMAIN
#   FIREBASE_PROJECT_ID
#   FIREBASE_STORAGE_BUCKET
#   FIREBASE_MESSAGING_SENDER_ID
#   FIREBASE_APP_ID
#   GOOGLE_SERVICES_JSON_BASE64   base64 of google-services.json (optional)
#
# HOW TO ENCODE google-services.json:
#   base64 -i google-services.json | tr -d '\n'   # macOS
#   base64 -w 0 google-services.json              # Linux
# =============================================================================

name: 🇩🇪 SnowB German AI — CI/CD

on:
  # ── Auto triggers ─────────────────────────────────────────────────────────
  push:
    branches:
      - main       # Full CI + preview APK build
      - develop    # Full CI only
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'

  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'

  # ── Manual trigger — pick a build profile ─────────────────────────────────
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production-apk
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - all

# ── Prevent duplicate workflow runs ─────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Global environment ───────────────────────────────────────────────────────
env:
  NODE_VERSION: '18.19.0'

# =============================================================================
# JOBS
# =============================================================================
jobs:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 1: CI — Validate, Type-check, Lint                                ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  ci:
    name: ✅ CI — Validate & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # Shallow clone is faster for CI

      # ── 2. Setup Node.js with npm cache ───────────────────────────────────
      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          # Cache key includes package-lock.json hash — cache busts on dep changes

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          echo "Installing npm dependencies..."
          npm ci --prefer-offline --no-audit
          # --prefer-offline  : use cached packages when available (faster CI)
          # --no-audit        : skip slow security audit (run separately if needed)
          # npm ci            : clean install from lock file (reproducible builds)

      # ── 4. Restore Expo cache ─────────────────────────────────────────────
      - name: 🗄️ Cache Expo CLI
        uses: actions/cache@v4
        with:
          path: ~/.expo
          key: expo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            expo-${{ runner.os }}-

      # ── 5. TypeScript type checking ───────────────────────────────────────
      - name: 🔷 TypeScript — type check
        run: |
          echo "Running TypeScript compiler (noEmit)..."
          npm run type-check
        # Fails the job if any TS error exists.
        # noEmit means we only type-check, not compile.

      # ── 6. ESLint ─────────────────────────────────────────────────────────
      - name: 🔍 ESLint — code quality
        run: |
          echo "Linting TypeScript/TSX files..."
          npm run lint
        # --max-warnings 0 (set in package.json) means ANY warning fails CI.
        # To allow warnings: change to: npm run lint -- --max-warnings 10

      # ── 7. Prettier format check ──────────────────────────────────────────
      - name: 💅 Prettier — format check
        run: |
          echo "Checking code formatting..."
          npm run format:check
        continue-on-error: true
        # Soft fail — format issues are warnings, not blockers.
        # Remove continue-on-error to enforce strict formatting.

      # ── 8. Run tests ──────────────────────────────────────────────────────
      - name: 🧪 Jest — unit tests
        run: |
          echo "Running test suite..."
          npm test -- --ci --forceExit --detectOpenHandles
        env:
          # Inject public env vars for tests (non-secret defaults are fine)
          EXPO_PUBLIC_APP_ENV: test
          EXPO_PUBLIC_ANTHROPIC_KEY: test-key-not-real
          EXPO_PUBLIC_FIREBASE_API_KEY: test-key
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: test-project
        # --ci              : fail on first error, no watch mode
        # --forceExit       : exit after all tests finish (prevents hanging)
        # --detectOpenHandles: warn about async ops that keep Jest alive

      # ── 9. Validate Expo config ───────────────────────────────────────────
      - name: 🏥 Expo Doctor — validate config
        run: |
          echo "Running expo-doctor to detect config issues..."
          npx expo-doctor || true
          # '|| true' makes this advisory — expo-doctor can flag peer dep
          # warnings that don't actually break builds.

      # ── 10. Verify EAS config is valid JSON ───────────────────────────────
      - name: 📋 Validate eas.json
        run: |
          echo "Validating eas.json syntax..."
          python3 -c "
          import json, sys
          try:
              with open('eas.json') as f:
                  data = json.load(f)
              profiles = list(data.get('build', {}).keys())
              print(f'✅ eas.json valid — build profiles: {profiles}')
          except Exception as e:
              print(f'❌ eas.json invalid: {e}')
              sys.exit(1)
          "

      # ── 11. Check for secrets accidentally committed ───────────────────────
      - name: 🔐 Security — check for committed secrets
        run: |
          echo "Scanning for accidentally committed secrets..."
          # Fail if .env file is tracked by git
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ ERROR: .env is tracked by git! Remove it immediately."
            echo "   Run: git rm --cached .env && git commit -m 'Remove .env'"
            exit 1
          fi
          # Fail if google-services.json is tracked
          if git ls-files --error-unmatch google-services.json 2>/dev/null; then
            echo "❌ ERROR: google-services.json is tracked by git!"
            exit 1
          fi
          # Fail if google-play-key.json is tracked
          if git ls-files --error-unmatch google-play-key.json 2>/dev/null; then
            echo "❌ ERROR: google-play-key.json is tracked by git!"
            exit 1
          fi
          echo "✅ No secrets found in git tracking."

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 2: EAS Build — Preview APK (only on push to main)                 ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  build-preview:
    name: 🏗️ EAS Build — Preview APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: ci   # Only run if CI passes

    # Trigger conditions:
    #   - Push to main branch, OR
    #   - Manual workflow_dispatch with preview/production-apk profile
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && 
       (github.event.inputs.build_profile == 'preview' || 
        github.event.inputs.build_profile == 'production-apk'))

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node ─────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Install deps ───────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      # ── 4. Setup Expo + EAS (official action) ─────────────────────────────
      - name: 🚀 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          # This action: installs expo-cli, eas-cli, and authenticates
          # using the EXPO_TOKEN secret. Caches the CLI between runs.

      # ── 5. Inject google-services.json from secret ────────────────────────
      # NOTE: 'secrets' context cannot be used in 'if:' conditions — GitHub
      # Actions disallows it. Instead, we pass the secret as an env var and
      # guard with a shell conditional inside the run block.
      - name: 🔑 Inject google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_B64" ]; then
            echo "Decoding google-services.json from GitHub Secret..."
            echo "$GOOGLE_SERVICES_B64" | base64 --decode > google-services.json
            echo "✅ google-services.json written."
          else
            echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 secret not set — skipping."
            echo "   Firebase features will use fallback/mock config."
          fi

      # ── 6. Create .env for the build ──────────────────────────────────────
      - name: 🌍 Create .env from GitHub Secrets
        run: |
          cat > .env << EOF
          APP_ENV=preview
          EXPO_PUBLIC_APP_ENV=preview
          EXPO_PUBLIC_ANTHROPIC_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EOF
          echo "✅ .env written (values redacted in logs)"
        # Note: env var values are masked in GitHub Actions logs automatically
        # when they are defined as secrets.

      # ── 7. Determine build profile ────────────────────────────────────────
      - name: 🎯 Set build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ github.event.inputs.build_profile }}"
          else
            PROFILE="preview"
          fi
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT
          echo "Build profile: $PROFILE"

      # ── 8. EAS Build ──────────────────────────────────────────────────────
      - name: 🏗️ EAS Build — ${{ steps.profile.outputs.profile }}
        run: |
          echo "Starting EAS cloud build..."
          echo "Profile: ${{ steps.profile.outputs.profile }}"
          echo "Platform: ${{ github.event.inputs.platform || 'android' }}"
          eas build \
            --platform ${{ github.event.inputs.platform || 'android' }} \
            --profile ${{ steps.profile.outputs.profile }} \
            --non-interactive \
            --no-wait
          # --non-interactive : required for CI (no prompts)
          # --no-wait         : queue the build and return immediately.
          #                     The build link is printed to logs.
          #                     Remove --no-wait to wait for completion
          #                     (uses more CI minutes on GitHub Actions).

      # ── 9. Post build status ──────────────────────────────────────────────
      - name: 📊 Build queued summary
        run: |
          echo "## 🏗️ EAS Build Queued" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | ${{ steps.profile.outputs.profile }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | ${{ github.event.inputs.platform || 'android' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 View build progress at: https://expo.dev/accounts/YOUR_USERNAME/projects/snowb-german-ai/builds" >> $GITHUB_STEP_SUMMARY

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 3: EAS Build — Production (only on manual dispatch)               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  build-production:
    name: 🚀 EAS Build — Production AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: ci

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_profile == 'production'

    environment:
      name: production
      # Define this environment in GitHub repo Settings → Environments
      # You can add required reviewers before production builds deploy

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🚀 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🔑 Inject google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_B64" ]; then
            echo "$GOOGLE_SERVICES_B64" | base64 --decode > google-services.json
            echo "✅ google-services.json written."
          else
            echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 not set — skipping."
          fi

      - name: 🌍 Create .env (production)
        run: |
          cat > .env << EOF
          APP_ENV=production
          EXPO_PUBLIC_APP_ENV=production
          EXPO_PUBLIC_ANTHROPIC_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EOF

      - name: 🏗️ EAS Build — Production AAB
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --no-wait

      - name: 📊 Production build summary
        run: |
          echo "## 🚀 Production Build Queued" >> $GITHUB_STEP_SUMMARY
          echo "Check https://expo.dev for download link when complete." >> $GITHUB_STEP_SUMMARY
          echo "The AAB can be submitted to Google Play with: \`eas submit\`" >> $GITHUB_STEP_SUMMARY
